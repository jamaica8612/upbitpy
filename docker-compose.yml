services:
  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - USL_DATA_DIR=/data
    restart: unless-stopped

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped
